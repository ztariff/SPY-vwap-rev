<meta charset="utf-8">
<title>SPY VWAP Fade Strategy — Credit Spreads Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#131722;color:#DDD;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden}
.stat-pos{color:#26a69a}.stat-neg{color:#ef5350}.stat-neutral{color:#aaa}

/* Header */
#header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#1e2130;border-bottom:1px solid #2a2e3d;height:52px}
#header h1{font-size:16px;font-weight:600;color:#e0e0e0}
#header .stats{display:flex;gap:24px;font-size:13px}
#header .stat-label{color:#888;margin-right:6px}
#header .stat-value{font-weight:600}

/* Controls */
.cal-controls{display:flex;align-items:center;gap:16px;margin-bottom:16px;padding:16px 20px 0 20px}
.cal-controls button{background:#2a2e3d;color:#aaa;border:1px solid #3a3f52;border-radius:4px;padding:6px 14px;font-size:13px;cursor:pointer}
.cal-controls button:hover{background:#363c52;color:#fff}
.cal-controls .cal-title{font-size:16px;font-weight:600;min-width:180px;text-align:center}
.cal-filter-group{display:flex;gap:8px;margin-left:auto}
.cal-filter{background:#2a2e3d;color:#aaa;border:1px solid #3a3f52;border-radius:4px;padding:5px 10px;font-size:12px;cursor:pointer}
.cal-filter.active{background:#2962ff;color:#fff;border-color:#2962ff}

/* Mini equity curve */
#mini-equity-wrap{padding:8px 20px;position:relative}
#mini-equity-container{width:100%;height:120px;background:#131722;border-radius:6px;border:1px solid #2a2e3d}

/* Calendar */
#calendar-wrap{padding:8px 20px 20px 20px}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-header-cell{text-align:center;font-size:11px;color:#666;padding:8px 4px;text-transform:uppercase;letter-spacing:1px}
.cal-cell{min-height:100px;background:#1a1d2e;border:1px solid #2a2e3d;border-radius:4px;padding:8px 10px;position:relative;cursor:default;transition:all .15s}
.cal-cell.other-month{opacity:.3}
.cal-cell.has-trade{cursor:pointer}
.cal-cell.has-trade:hover{border-color:#2962ff;background:#1e2240}
.cal-cell.selected{border-color:#2962ff;background:#1e2240;box-shadow:0 0 0 1px #2962ff}
.cal-cell .day-num{font-size:12px;color:#666;margin-bottom:6px}
.cal-cell.today .day-num{color:#2962ff;font-weight:700}
.cal-trade-pill{font-size:10px;padding:3px 7px;border-radius:3px;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center;gap:4px}
.cal-trade-pill.win{background:rgba(38,166,154,.15);color:#26a69a;border:1px solid rgba(38,166,154,.3)}
.cal-trade-pill.loss{background:rgba(239,83,80,.15);color:#ef5350;border:1px solid rgba(239,83,80,.3)}
.cal-trade-pill .pill-label{font-weight:600}
.cal-trade-pill .pill-pnl{font-weight:700}
.cal-day-total{position:absolute;bottom:5px;right:8px;font-size:11px;font-weight:700}

/* Trade detail inline */
#trade-detail-section{padding:0 20px 40px 20px}
.trade-detail-divider{height:1px;background:#2a2e3d;margin:24px 0 20px 0}
.trade-block{margin-bottom:32px;border:1px solid #2a2e3d;border-radius:8px;background:#161925;overflow:hidden}
.trade-block-header{display:flex;align-items:center;gap:16px;padding:14px 18px;background:#1a1d2e;border-bottom:1px solid #2a2e3d;flex-wrap:wrap}
.trade-block-header .trade-dir{padding:4px 12px;border-radius:4px;font-size:12px;font-weight:700;text-transform:uppercase}
.trade-block-header .trade-dir.put-fade{background:rgba(239,83,80,.2);color:#ef5350}
.trade-block-header .trade-dir.call-fade{background:rgba(38,166,154,.2);color:#26a69a}
.trade-block-header .trade-dir.put-credit{background:rgba(38,166,154,.2);color:#26a69a}
.trade-block-header .trade-pnl{font-size:18px;font-weight:700;margin-left:auto}
.trade-meta{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:14px 18px}
.trade-meta-card{background:#1a1d2e;border:1px solid #2a2e3d;border-radius:6px;padding:8px 12px}
.trade-meta-card .meta-label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.5px}
.trade-meta-card .meta-value{font-size:14px;font-weight:600;margin-top:3px}
.trade-charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px 18px}
.trade-chart-box{background:#1a1d2e;border:1px solid #2a2e3d;border-radius:6px;padding:12px;position:relative}
.trade-chart-box .chart-label{font-size:12px;color:#888;margin-bottom:8px;font-weight:600}
.trade-chart-container{width:100%;height:320px}
.tt-overlay{position:absolute;top:36px;left:20px;background:rgba(19,23,34,.85);border:1px solid #2a2e3d;border-radius:5px;padding:6px 10px;font-size:11px;line-height:1.6;pointer-events:none;z-index:100;backdrop-filter:blur(4px);min-width:140px;display:none}
.tt-overlay .tt-time{color:#888;font-size:10px}
.tt-overlay .tt-row{display:flex;justify-content:space-between;gap:12px}
.tt-overlay .tt-label{color:#888}
.tt-up{color:#26a69a}.tt-dn{color:#ef5350}
.loading-placeholder{display:flex;align-items:center;justify-content:center;height:200px;color:#555;font-size:14px}
</style>
</head>

const RISK_PER_TRADE=100000;

function fmtDollar(v){
    const abs=Math.abs(v);
    const s=abs>=1000?(abs/1000).toFixed(1)+'k':abs.toFixed(0);
    return (v>=0?'+$':'-$')+s;
}

function sizeTrade(t){
    if(t.product&&t.product.includes('spread')){
        const maxRiskPerContract=(t.spread_width-t.credit_received)*100;
        if(maxRiskPerContract<=0){t._contracts=0;t._dollarPnl=0;t._totalCredit=0;t._maxRiskTotal=0;return}
        t._contracts=Math.floor(RISK_PER_TRADE/maxRiskPerContract);
        t._dollarPnl=t.pnl_dollar*100*t._contracts;
        t._totalCredit=t.credit_received*100*t._contracts;
        t._maxRiskTotal=maxRiskPerContract*t._contracts;
    }else{
        const ep=t.option_entry_price||0;
        if(ep<=0){t._contracts=0;t._dollarPnl=0;t._maxRiskTotal=0;return}
        const riskPer=ep*100;
        t._contracts=Math.floor(RISK_PER_TRADE/riskPer);
        t._dollarPnl=t.pnl_dollar*100*t._contracts;
        t._maxRiskTotal=riskPer*t._contracts;
    }
}

function init(){
    TRADES=EMBEDDED_TRADES;
    TRADES.sort((a,b)=>a.date.localeCompare(b.date));
    TRADES.forEach(t=>sizeTrade(t));
    if(TRADES.length){
        const last=new Date(TRADES[TRADES.length-1].date+'T12:00:00');
        currentMonth=new Date(last.getFullYear(),last.getMonth(),1);
    }
    updateHeaderStats();
    renderMiniEquity();
    renderCalendar();
}

// ===========================================================================
//  HEADER STATS
// ===========================================================================
function fmtPct(v){return (v>=0?'+':'')+v.toFixed(2)+'%'}
function setStatEl(id,text,cls){const el=document.getElementById(id);el.textContent=text;el.className='stat-value '+cls}

function getFilteredTrades(){
    if(activeFilter==='all')return TRADES;
    if(activeFilter==='pc_30_20')return TRADES.filter(t=>t.short_delta===0.3&&t.long_delta===0.2);
    if(activeFilter==='pc_35_20')return TRADES.filter(t=>t.short_delta===0.35&&t.long_delta===0.2);
    if(activeFilter==='pc_40_30')return TRADES.filter(t=>t.short_delta===0.4&&t.long_delta===0.3);
    if(activeFilter==='winners')return TRADES.filter(t=>t.pnl_pct>0);
    if(activeFilter==='losers')return TRADES.filter(t=>t.pnl_pct<=0);
    return TRADES;
}

function updateHeaderStats(){
    const trades=getFilteredTrades(),n=trades.length;
    if(!n){['stat-trades','stat-wr','stat-exp','stat-total','stat-pf'].forEach(id=>setStatEl(id,'-','stat-neutral'));return}
    const wins=trades.filter(t=>t.pnl_pct>0).length;
    const wr=wins/n*100;
    const totalDollarPnl=trades.reduce((s,t)=>s+t._dollarPnl,0);
    const avgDollarPnl=totalDollarPnl/n;
    const dollarWins=trades.filter(t=>t._dollarPnl>0).reduce((s,t)=>s+t._dollarPnl,0);
    const dollarLosses=Math.abs(trades.filter(t=>t._dollarPnl<0).reduce((s,t)=>s+t._dollarPnl,0));
    const pf=dollarLosses>0?dollarWins/dollarLosses:Infinity;
    setStatEl('stat-trades',n,'stat-neutral');
    setStatEl('stat-wr',wr.toFixed(1)+'%',wr>=50?'stat-pos':'stat-neg');
    setStatEl('stat-exp',fmtDollar(avgDollarPnl),avgDollarPnl>=0?'stat-pos':'stat-neg');
    setStatEl('stat-total',fmtDollar(totalDollarPnl),totalDollarPnl>=0?'stat-pos':'stat-neg');
    setStatEl('stat-pf',pf===Infinity?'---':pf.toFixed(2),pf>=1?'stat-pos':'stat-neg');
}

// ===========================================================================
//  MINI EQUITY CURVE (above calendar)
// ===========================================================================
function renderMiniEquity(){
    const container=document.getElementById('mini-equity-container');
    if(miniChart){miniChart.remove();miniChart=null}
    const trades=getFilteredTrades();
    if(!trades.length){container.innerHTML='';return}

    miniChart=LightweightCharts.createChart(container,{
        width:container.clientWidth,height:120,
        layout:{background:{color:'#131722'},textColor:'#999'},
        grid:{vertLines:{visible:false},horzLines:{color:'rgba(255,255,255,0.03)'}},
        rightPriceScale:{borderVisible:false,drawTicks:false},
        timeScale:{borderVisible:false,timeVisible:false,fixLeftEdge:true,fixRightEdge:true},
        crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
        handleScroll:false,handleScale:false,
    });

    // Aggregate by date
    const byDate={};
    trades.forEach(t=>{if(!byDate[t.date])byDate[t.date]=0;byDate[t.date]+=t._dollarPnl});
    let cum=0;
    const eqData=[];
    Object.keys(byDate).sort().forEach(d=>{cum+=byDate[d];eqData.push({time:d,value:Math.round(cum*100)/100})});

    const areaSeries=miniChart.addAreaSeries({
        topColor:cum>=0?'rgba(38,166,154,0.3)':'rgba(239,83,80,0.3)',
        bottomColor:cum>=0?'rgba(38,166,154,0.02)':'rgba(239,83,80,0.02)',
        lineColor:cum>=0?'#26a69a':'#ef5350',lineWidth:2,
        lastValueVisible:true,priceLineVisible:false,
    });
    areaSeries.setData(eqData);
    miniChart.timeScale().fitContent();

    new ResizeObserver(()=>{if(miniChart)miniChart.applyOptions({width:container.clientWidth})}).observe(container);
}

// ===========================================================================
//  CALENDAR
// ===========================================================================
function renderCalendar(){
    const grid=document.getElementById('calendar-grid');
    const year=currentMonth.getFullYear(),month=currentMonth.getMonth();
    document.getElementById('cal-title').textContent=new Date(year,month).toLocaleString('en-US',{month:'long',year:'numeric'});

    const firstDay=new Date(year,month,1),lastDay=new Date(year,month+1,0);
    const startPad=firstDay.getDay(),daysInMonth=lastDay.getDate();
    const trades=getFilteredTrades();
    const byDate={};
    trades.forEach(t=>{if(!byDate[t.date])byDate[t.date]=[];byDate[t.date].push(t)});

    const today=new Date().toISOString().slice(0,10);
    const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    let html=dayNames.map(d=>`<div class="cal-header-cell">${d}</div>`).join('');

    const prevMonth=new Date(year,month,0);
    for(let i=startPad-1;i>=0;i--){html+=`<div class="cal-cell other-month"><div class="day-num">${prevMonth.getDate()-i}</div></div>`}

    for(let d=1;d<=daysInMonth;d++){
        const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dt=byDate[ds]||[];
        const hasTrade=dt.length>0;
        const dayPnl=dt.reduce((s,t)=>s+t._dollarPnl,0);
        let cls='cal-cell';
        if(ds===today)cls+=' today';
        if(hasTrade)cls+=' has-trade';
        if(ds===selectedDate)cls+=' selected';

        let inner=`<div class="day-num">${d}</div>`;
        dt.forEach(t=>{
            const isWin=t._dollarPnl>0;
            let label;
            if(t.product&&t.product.includes('spread')){
                label=`PC ${t.short_delta||''}/${t.long_delta||''}`;
            }else{
                label=t.direction==='above'?'PUT':'CALL';
                if(t.delta)label+=` ${t.delta}d`;
            }
            inner+=`<div class="cal-trade-pill ${isWin?'win':'loss'}"><span class="pill-label">${label}</span><span class="pill-pnl">${fmtDollar(t._dollarPnl)}</span></div>`;
        });
        if(hasTrade){
            const tc=dayPnl>=0?'stat-pos':'stat-neg';
            inner+=`<div class="cal-day-total ${tc}">${fmtDollar(dayPnl)}</div>`;
        }
        const onclick=hasTrade?`onclick="selectDay('${ds}')"`:'';
        html+=`<div class="${cls}" ${onclick}>${inner}</div>`;
    }

    const totalCells=startPad+daysInMonth;
    const remaining=(7-(totalCells%7))%7;
    for(let i=1;i<=remaining;i++){html+=`<div class="cal-cell other-month"><div class="day-num">${i}</div></div>`}
    grid.innerHTML=html;
}

            <div class="trade-meta-card"><div class="meta-label">$P&L</div><div class="meta-value ${trade._dollarPnl>=0?'stat-pos':'stat-neg'}">${fmtDollar(trade._dollarPnl)}</div></div>
            <div class="trade-meta-card"><div class="meta-label">Entry</div><div class="meta-value">${fmtTime12(trade.entry_time)}</div></div>
            <div class="trade-meta-card"><div class="meta-label">Exit</div><div class="meta-value">${fmtTime12(trade.exit_time)}</div></div>
            <div class="trade-meta-card"><div class="meta-label">Exit Reason</div><div class="meta-value" style="color:${trade.exit_reason==='target'?'#26a69a':trade.exit_reason&&trade.exit_reason.includes('stop')?'#ef5350':'#aaa'}">${exitReason}</div></div>
            <div class="trade-meta-card"><div class="meta-label">Held</div><div class="meta-value">${trade.minutes_held!=null?Math.round(trade.minutes_held)+'m':'-'}</div></div>
            <div class="trade-meta-card"><div class="meta-label">Target / Stop</div><div class="meta-value">${trade.target_pct!=null?(trade.target_pct*100).toFixed(0):'?'}% credit / ${trade.stop_pct!=null?trade.stop_pct.toFixed(1):'?'}x credit</div></div>`;
        }else{
            metaHtml=`
            <div class="trade-meta-card"><div class="meta-label">SPY at Entry</div><div class="meta-value">$${trade.spy_entry_price?.toFixed(2)||'-'}</div></div>
            <div class="trade-meta-card"><div class="meta-label">Option Entry</div><div class="meta-value">$${trade.option_entry_price?.toFixed(2)||'-'}</div></div>
            <div class="trade-meta-card"><div class="meta-label">Option Exit</div><div class="meta-value">$${trade.option_exit_price?.toFixed(2)||'-'}</div></div>
            <div class="trade-meta-card"><div class="meta-label">Entry</div><div class="meta-value">${fmtTime12(trade.entry_time)}</div></div>
            <div class="trade-meta-card"><div class="meta-label">Exit</div><div class="meta-value">${fmtTime12(trade.exit_time)}</div></div>
            <div class="trade-meta-card"><div class="meta-label">Exit Reason</div><div class="meta-value" style="color:${trade.exit_reason==='target'?'#26a69a':trade.exit_reason==='stop_loss'?'#ef5350':'#aaa'}">${(trade.exit_reason||'-').toUpperCase()}</div></div>
            <div class="trade-meta-card"><div class="meta-label">Held</div><div class="meta-value">${trade.minutes_held!=null?Math.round(trade.minutes_held)+'m':'-'}</div></div>
            <div class="trade-meta-card"><div class="meta-label">Target / Stop</div><div class="meta-value">${trade.target_pct!=null?(trade.target_pct*100).toFixed(0):'?'}% / ${trade.stop_pct!=null?(trade.stop_pct*100).toFixed(0):'?'}%</div></div>
            <div class="trade-meta-card"><div class="meta-label">Max Fav</div><div class="meta-value stat-pos">${trade.max_favorable_pct!=null?'+'+trade.max_favorable_pct.toFixed(1)+'%':'-'}</div></div>
            <div class="trade-meta-card"><div class="meta-label">Max Adv</div><div class="meta-value stat-neg">${trade.max_adverse_pct!=null?'-'+Math.abs(trade.max_adverse_pct).toFixed(1)+'%':'-'}</div></div>`;
        }

        // Chart labels
        const shortChartLabel=isSpread?(trade.short_ticker||'Short Leg')+' (Short)':'SPY 1-Min with VWAP';
        const longChartLabel=isSpread?(trade.long_ticker||'Long Leg')+' (Long)':(trade.option_ticker||'Option')+' 1-Min';

        html+=`<div class="trade-block">
        <div class="trade-block-header">
            <span class="trade-dir ${dirClass}">${dirLabel}</span>
            <span style="color:#aaa;font-size:13px">${legLabel}</span>
            <span style="color:#aaa;font-size:12px">ATR ${trade.atr_mult}x</span>
            <span class="trade-pnl" style="color:${pnlColor}">${fmtPct(trade.pnl_pct)} ${fmtDollar(trade._dollarPnl)}</span>
        </div>
        <div class="trade-meta">${metaHtml}</div>
        <div class="trade-charts-grid">
            <div class="trade-chart-box">
                <div class="chart-label">${isSpread?'SPY 1-Min with VWAP':shortChartLabel}</div>
                <div class="trade-chart-container" id="spy-chart-${idx}"></div>
                <div class="tt-overlay" id="spy-tt-${idx}"></div>
            </div>
            <div class="trade-chart-box">
                <div class="chart-label">${isSpread?'Spread Value (Short − Long)':'Option'} 1-Min</div>
                <div class="trade-chart-container" id="opt-chart-${idx}"></div>
                <div class="tt-overlay" id="opt-tt-${idx}"></div>
            </div>
        </div>
        </div>`;
    });

    section.innerHTML=html;

    // Scroll to trade detail
    section.scrollIntoView({behavior:'smooth',block:'start'});

    // Load charts
    dayTrades.forEach((trade,idx)=>loadTradeCharts(trade,idx));
}

// ===========================================================================
//  TIME FORMATTING (12-hour NY time)
// ===========================================================================
function fmtTime12(t){
    if(!t)return '-';
    // t is "HH:MM" in 24h
    const parts=t.split(':');
    let h=parseInt(parts[0]),m=parts[1];
    const ampm=h>=12?'PM':'AM';
    if(h>12)h-=12;
    if(h===0)h=12;
    return h+':'+m+' '+ampm;
}

function tsToNY12(unixSec){
    const d=new Date(unixSec*1000);
    return d.toLocaleString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit',hour12:true});
}

// Custom time formatter for LightweightCharts
function nyTimeTickFormatter(unixSec){
    return tsToNY12(unixSec);
}

// ===========================================================================
//  CHART HELPERS
// ===========================================================================
function createMiniChart(container,height){
    return LightweightCharts.createChart(container,{
        width:container.clientWidth,height:height||320,
        layout:{background:{color:'#1a1d2e'},textColor:'#DDD'},
        grid:{vertLines:{color:'rgba(255,255,255,0.03)'},horzLines:{color:'rgba(255,255,255,0.03)'}},
        timeScale:{borderColor:'#2a2e3d',timeVisible:true,secondsVisible:false,
            tickMarkFormatter:nyTimeTickFormatter},
        rightPriceScale:{borderColor:'#2a2e3d'},
        crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
        localization:{timeFormatter:nyTimeTickFormatter},
    });
}

async function fetchPolygonBars(ticker,dateStr,tfMin){
    const ck=`${ticker}_${dateStr}_${tfMin}`;
    if(fetchCache[ck])return fetchCache[ck];
    const url=`https://api.polygon.io/v2/aggs/ticker/${ticker}/range/${tfMin}/minute/${dateStr}/${dateStr}?adjusted=true&sort=asc&limit=10000&apiKey=${POLYGON_KEY}`;
    try{
        const resp=await fetch(url);const json=await resp.json();
        if(!json.results){fetchCache[ck]=[];return[]}
        const bars=json.results.map(r=>({time:Math.floor(r.t/1000),open:r.o,high:r.h,low:r.l,close:r.c,volume:r.v||0,vw:r.vw}));
        fetchCache[ck]=bars;return bars;
    }catch(e){fetchCache[ck]=[];return[]}
}

function findClosestTimestamp(bars,timeStr){
    if(!timeStr||!bars.length)return null;
    let targetMin;
    if(timeStr.includes('T')){
        const d=new Date(timeStr);
        const et=new Date(d.toLocaleString('en-US',{timeZone:'America/New_York'}));
        targetMin=et.getHours()*60+et.getMinutes();
    }else{
        const p=timeStr.split(':');targetMin=parseInt(p[0])*60+parseInt(p[1]);
    }
    let closest=null,minDiff=Infinity;
    bars.forEach(b=>{
        const d=new Date(b.time*1000);
        const et=new Date(d.toLocaleString('en-US',{timeZone:'America/New_York'}));
        const bm=et.getHours()*60+et.getMinutes();
        const diff=Math.abs(bm-targetMin);
        if(diff<minDiff){minDiff=diff;closest=b.time}
    });
    return closest;
}

function addVWAPLine(chart,bars){
    if(!bars.length||!bars[0].vw)return;
    const vs=chart.addLineSeries({color:'rgba(255,152,0,0.6)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,lastValueVisible:false,priceLineVisible:false});
    let cumPV=0,cumV=0;
    const d=bars.filter(b=>b.volume>0).map(b=>{const tp=(b.high+b.low+b.close)/3;cumPV+=tp*b.volume;cumV+=b.volume;return{time:b.time,value:cumPV/cumV}});
    if(d.length)vs.setData(d);
}

function setupTooltip(chart,series,ttId){
    const tt=document.getElementById(ttId);if(!tt)return;
    chart.subscribeCrosshairMove(param=>{
        if(!param||!param.time||!param.seriesData){tt.style.display='none';return}
        const c=param.seriesData.get(series);if(!c){tt.style.display='none';return}
        const up=c.close>=c.open,cls=up?'tt-up':'tt-dn';
        const fmt=v=>v!=null?v.toFixed(2):'-';
        tt.innerHTML=`<div class="tt-time">${tsToNY12(param.time)}</div>
            <div class="tt-row"><span class="tt-label">O</span><span class="${cls}">${fmt(c.open)}</span></div>
            <div class="tt-row"><span class="tt-label">H</span><span class="${cls}">${fmt(c.high)}</span></div>
            <div class="tt-row"><span class="tt-label">L</span><span class="${cls}">${fmt(c.low)}</span></div>
            <div class="tt-row"><span class="tt-label">C</span><span class="${cls}">${fmt(c.close)}</span></div>`;
        tt.style.display='block';
    });
}

// ===========================================================================
//  LOAD TRADE CHARTS
// ===========================================================================
async function loadTradeCharts(trade,idx){
    const spyC=document.getElementById(`spy-chart-${idx}`);
    const optC=document.getElementById(`opt-chart-${idx}`);
    if(!spyC||!optC)return;

    // SPY chart
    const spyChart=createMiniChart(spyC,320);
    tradeCharts.push(spyChart);
    const spyCandles=spyChart.addCandlestickSeries({upColor:'#26a69a',downColor:'#ef5350',borderUpColor:'#26a69a',borderDownColor:'#ef5350',wickUpColor:'#26a69a',wickDownColor:'#ef5350'});

    const spyData=await fetchPolygonBars('SPY',trade.date,1);
    if(spyData.length){
        spyCandles.setData(spyData);
        const markers=[];
        if(trade.entry_time_iso){
            const ts=findClosestTimestamp(spyData,trade.entry_time_iso);
            if(ts)markers.push({time:ts,position:'belowBar',color:'#2962ff',shape:'circle',text:`ENTRY $${trade.spy_entry_price?.toFixed(2)||''}`});
        }
        if(trade.exit_time_iso){
            const ts=findClosestTimestamp(spyData,trade.exit_time_iso);
            if(ts)markers.push({time:ts,position:'aboveBar',color:trade.pnl_pct>=0?'#26a69a':'#ef5350',shape:'circle',text:`EXIT (${trade.exit_reason||''})`});
        }
        if(markers.length){markers.sort((a,b)=>a.time-b.time);spyCandles.setMarkers(markers)}
        addVWAPLine(spyChart,spyData);
        spyChart.timeScale().fitContent();
    }

    // Option / Spread chart
    const isSpread=trade.product&&trade.product.includes('spread');
    const optChart=createMiniChart(optC,320);
    tradeCharts.push(optChart);

    if(isSpread&&trade.short_ticker&&trade.long_ticker){
        // SPREAD: show spread value (short - long) as area/line chart
        const [shortData,longData]=await Promise.all([
            fetchPolygonBars(trade.short_ticker,trade.date,1),
            fetchPolygonBars(trade.long_ticker,trade.date,1)
        ]);

        if(shortData.length&&longData.length){
            // Build lookup of long leg by timestamp
            const longMap=new Map();
            longData.forEach(b=>longMap.set(b.time,b));

            // Compute spread value for each bar where both legs exist
            const spreadLine=[];
            shortData.forEach(b=>{
                const lb=longMap.get(b.time);
                if(lb){
                    const sv=b.close-lb.close;
                    spreadLine.push({time:b.time,value:Math.max(sv,0)});
                }
            });

            if(spreadLine.length){
                // Credit received = entry spread value
                const cr=trade.credit_received||0;

                // Area series — green below credit (winning), red above (losing)
                const spreadArea=optChart.addAreaSeries({
                    topColor:'rgba(239,83,80,0.3)',bottomColor:'rgba(38,166,154,0.15)',
                    lineColor:'#b0bec5',lineWidth:2,
                    crosshairMarkerVisible:true,
                    priceFormat:{type:'price',precision:2,minMove:0.01}
                });
                spreadArea.setData(spreadLine);

                // Credit received line (entry spread value)
                if(cr>0){
                    const crLine=optChart.addLineSeries({color:'#2962ff',lineWidth:1.5,lineStyle:LightweightCharts.LineStyle.Dashed,lastValueVisible:false,priceLineVisible:false});
                    crLine.setData(spreadLine.map(b=>({time:b.time,value:cr})));
                }

                // Target line: spread decays to credit*(1-target_pct)
                if(trade.target_pct&&cr>0){
                    const targetVal=cr*(1-trade.target_pct);
                    const tLine=optChart.addLineSeries({color:'rgba(38,166,154,0.6)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dotted,lastValueVisible:false,priceLineVisible:false});
                    tLine.setData(spreadLine.map(b=>({time:b.time,value:Math.max(targetVal,0)})));
                }

                // Stop line: spread widens to credit*(1+stop_pct) — capital at risk threshold
                if(trade.stop_pct&&cr>0){
                    const stopVal=cr*(1+trade.stop_pct);
                    const sLine=optChart.addLineSeries({color:'rgba(239,83,80,0.6)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dotted,lastValueVisible:false,priceLineVisible:false});
                    sLine.setData(spreadLine.map(b=>({time:b.time,value:stopVal})));
                }

                // Entry/exit markers on the spread line
                const markers=[];
                if(trade.entry_time_iso){
                    const ts=findClosestTimestamp(spreadLine,trade.entry_time_iso);
                    if(ts)markers.push({time:ts,position:'aboveBar',color:'#2962ff',shape:'circle',text:`OPEN $${cr.toFixed(2)} credit`});
                }
                if(trade.exit_time_iso){
                    const ts=findClosestTimestamp(spreadLine,trade.exit_time_iso);
                    const exitVal=trade.exit_spread_value!=null?`$${trade.exit_spread_value.toFixed(2)}`:'';
                    if(ts)markers.push({time:ts,position:'belowBar',color:trade.pnl_pct>=0?'#26a69a':'#ef5350',shape:'circle',text:`CLOSE ${exitVal} (${(trade.exit_reason||'').replace(/_/g,' ')})`});
                }
                if(markers.length){markers.sort((a,b)=>a.time-b.time);spreadArea.setMarkers(markers)}

                setupTooltip(optChart,spreadArea,`opt-tt-${idx}`);
                optChart.timeScale().fitContent();
            }else{optC.innerHTML='<div class="loading-placeholder">No aligned spread data</div>'}
        }else{optC.innerHTML='<div class="loading-placeholder">No spread leg data</div>'}
    }else if(trade.option_ticker){
        // LONG OPTION: original single-leg chart
        const optCandles=optChart.addCandlestickSeries({upColor:'#26a69a',downColor:'#ef5350',borderUpColor:'#26a69a',borderDownColor:'#ef5350',wickUpColor:'#26a69a',wickDownColor:'#ef5350'});
        const volSeries=optChart.addHistogramSeries({priceFormat:{type:'volume'},priceScaleId:'vol'});
        optChart.priceScale('vol').applyOptions({scaleMargins:{top:0.8,bottom:0}});

        const optData=await fetchPolygonBars(trade.option_ticker,trade.date,1);
        if(optData.length){
            optCandles.setData(optData);
            volSeries.setData(optData.map(b=>({time:b.time,value:b.volume||0,color:b.close>=b.open?'rgba(38,166,154,0.3)':'rgba(239,83,80,0.3)'})));

            const optMarkers=[];
            if(trade.entry_time_iso){
                const ts=findClosestTimestamp(optData,trade.entry_time_iso);
                if(ts)optMarkers.push({time:ts,position:'belowBar',color:'#2962ff',shape:'circle',text:`BUY $${trade.option_entry_price?.toFixed(2)||''}`});
            }
            if(trade.exit_time_iso){
                const ts=findClosestTimestamp(optData,trade.exit_time_iso);
                if(ts)optMarkers.push({time:ts,position:'aboveBar',color:trade.pnl_pct>=0?'#26a69a':'#ef5350',shape:'circle',text:`SELL $${trade.option_exit_price?.toFixed(2)||''}`});
            }
            if(optMarkers.length){optMarkers.sort((a,b)=>a.time-b.time);optCandles.setMarkers(optMarkers)}

            if(trade.option_entry_price){
                const el=optChart.addLineSeries({color:'rgba(41,98,255,0.5)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,lastValueVisible:false,priceLineVisible:false});
                el.setData(optData.map(b=>({time:b.time,value:trade.option_entry_price})));
                if(trade.target_pct){
                    const tl=optChart.addLineSeries({color:'rgba(38,166,154,0.4)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dotted,lastValueVisible:false,priceLineVisible:false});
                    tl.setData(optData.map(b=>({time:b.time,value:trade.option_entry_price*(1+trade.target_pct)})));
                }
                if(trade.stop_pct){
                    const sp=trade.option_entry_price*(1-trade.stop_pct);
                    if(sp>0){
                        const sl=optChart.addLineSeries({color:'rgba(239,83,80,0.4)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dotted,lastValueVisible:false,priceLineVisible:false});
                        sl.setData(optData.map(b=>({time:b.time,value:sp})));
                    }
                }
            }
            optChart.timeScale().fitContent();
        }else{optC.innerHTML='<div class="loading-placeholder">No option bar data</div>'}
    }else{optC.innerHTML='<div class="loading-placeholder">No option ticker</div>'}

    setupTooltip(spyChart,spyCandles,`spy-tt-${idx}`);
}

document.getElementById('prev-month').addEventListener('click',()=>{
    currentMonth=new Date(currentMonth.getFullYear(),currentMonth.getMonth()-1,1);renderCalendar();
});

    currentMonth=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+1,1);renderCalendar();
});
document.querySelectorAll('.cal-filter').forEach(btn=>{
    btn.addEventListener('click',()=>{
        document.querySelectorAll('.cal-filter').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter=btn.dataset.filter;
        selectedDate=null;
        document.getElementById('trade-detail-section').innerHTML='';
        tradeCharts.forEach(c=>c.remove());tradeCharts=[];
        updateHeaderStats();
        renderMiniEquity();
        renderCalendar();
    });
});
